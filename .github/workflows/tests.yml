name: Server Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'frontend/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'frontend/**'
      - 'LICENSE'
  schedule:
    # Weekly Monday 6AM UTC — catches Frappe upstream breakage
    - cron: '0 6 * * 1'

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MYSQL_ROOT_PASSWORD: frappe
          MARIADB_ROOT_PASSWORD: frappe
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5

      redis-cache:
        image: redis:7-alpine
        ports:
          - 13000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5

      redis-queue:
        image: redis:7-alpine
        ports:
          - 11000:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bench
        run: pip install frappe-bench

      - name: Set up Frappe environment
        run: bash ${GITHUB_WORKSPACE}/.github/helper/install.sh
        env:
          DB_ROOT_PASSWORD: frappe

      - name: Run tests
        working-directory: /home/runner/frappe-bench
        run: bench --site test_site run-tests --app jana
